<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kraft Talle · cámara</title>
<style>
  :root{ --negro:#161616; --gris2:#8a8a8a; --linea:#2a2a2a; --amarillo:#F5C400; --ok:#2ec27e; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#0d0d0d;color:#fff}
  header{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--linea)}
  header .marca{font-weight:800;letter-spacing:.5px}
  header .marca span{background:var(--amarillo);color:#000;padding:2px 7px;border-radius:4px}
  header .v{margin-left:auto;font-size:11px;color:var(--gris2)}
  .wrap{max-width:560px;margin:0 auto;padding:16px}
  .card{background:#161616;border:1px solid var(--linea);border-radius:12px;padding:16px;margin-bottom:14px}
  .pasos{font-size:13px;line-height:1.6;color:#ccc;margin:0;padding-left:18px}
  .pasos b{color:var(--amarillo)}
  .btn{appearance:none;border:none;background:var(--amarillo);color:#000;font-weight:800;padding:14px;border-radius:10px;cursor:pointer;font-size:15px;width:100%}
  .btn.ghost{background:#222;color:#fff;border:1px solid var(--linea)}
  .btn:disabled{opacity:.4}
  .estado{font-size:13px;color:var(--gris2);text-align:center;margin:8px 0;min-height:18px}
  .vista{position:relative;width:100%;background:#000;border-radius:10px;overflow:hidden;min-height:180px;display:flex;justify-content:center;align-items:center}
  video,canvas{max-width:100%;display:block}
  .barra{height:6px;background:#222;border-radius:3px;overflow:hidden;margin-top:8px}
  .barra i{display:block;height:100%;width:0;background:var(--ok);transition:width .12s}
  .resultado{display:flex;gap:10px;margin-top:6px}
  .metrica{flex:1;background:#000;border:1px solid var(--linea);border-radius:10px;padding:12px;text-align:center}
  .metrica .val{font-size:26px;font-weight:800}
  .metrica .val small{font-size:13px;color:var(--gris2)}
  .metrica .lab{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--gris2);margin-top:4px}
  .metrica.talla{background:var(--amarillo);color:#000}
  .metrica.talla .lab{color:#5a4d00}
  .slider{display:flex;align-items:center;gap:10px;margin-top:12px;font-size:13px}
  .slider input{flex:1}
  .cal{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;margin-top:12px}
  .cal input{width:64px;background:#000;border:1px solid var(--linea);color:#fff;border-radius:6px;padding:6px;text-align:center}
  .factor{color:var(--ok);font-weight:700}
</style>
</head>
<body>
<header>
  <div class="marca">KRAFT <span>TALLE</span></div>
  <div class="v">cámara · v2</div>
</header>

<div class="wrap">
  <div class="card">
    <ol class="pasos">
      <li>Hoja <b>A4 contra una pared</b>, lado corto tocando la pared.</li>
      <li><b>Talón contra la pared</b>, pie sobre la hoja.</li>
      <li>Cámara <b>desde arriba</b>. Mantené quieto hasta que la barra se llene: captura sola.</li>
    </ol>
  </div>

  <div class="card">
    <div class="vista">
      <video id="video" playsinline autoplay muted style="display:none"></video>
      <canvas id="live"></canvas>
    </div>
    <div class="estado" id="estado">Cargando motor de visión…</div>
    <div class="barra"><i id="lock"></i></div>
    <button class="btn" id="encender" disabled style="margin-top:10px">Encender cámara</button>
    <button class="btn ghost" id="capturar" style="display:none;margin-top:10px">Capturar ahora</button>
  </div>

  <div class="card" id="cardRes" style="display:none">
    <div class="vista"><canvas id="rect"></canvas></div>
    <div class="slider"><span>Ajuste pie</span><input type="range" id="umbral" min="-60" max="60" value="0"><span id="umbralVal">auto</span></div>
    <div class="resultado">
      <div class="metrica"><div class="val" id="mLargo">–<small> mm</small></div><div class="lab">Largo</div></div>
      <div class="metrica"><div class="val" id="mAncho">–<small> mm</small></div><div class="lab">Ancho</div></div>
      <div class="metrica talla"><div class="val" id="mTalla">–</div><div class="lab">Talla</div></div>
    </div>
    <div class="cal">
      <span>Mi pie mide</span><input type="number" id="pieReal" placeholder="mm"><span>mm</span>
      <button class="btn ghost" id="calibrar" style="width:auto;padding:8px 12px">Calibrar</button>
      <span class="factor" id="factorTxt"></span>
    </div>
    <button class="btn ghost" id="otra" style="margin-top:12px">Medir otra vez</button>
  </div>
</div>

<script>
(function(){
  var SCALE=2, A4=210/297;
  var video=document.getElementById('video'), live=document.getElementById('live'), lctx=live.getContext('2d');
  var rect=document.getElementById('rect'), rctx=rect.getContext('2d');
  var grab=document.createElement('canvas'), gctx=grab.getContext('2d');
  var streaming=false, loopT=null, lastQuad=null, stable=0, NEED=6;
  var factorCal=1, rawLargo=0, otsuVal=0, warpMat=null, tallas;

  function est(t){ document.getElementById('estado').textContent=t; }
  function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }
  function ordenar(p){ var s=p.slice().sort(function(a,b){return (a.x+a.y)-(b.x+b.y);}); var d=p.slice().sort(function(a,b){return (a.y-a.x)-(b.y-b.x);}); return [s[0],d[0],s[3],d[3]]; }

  // El loader de OpenCV (script de abajo) llama a este hook cuando cv.Mat está disponible.
  window.__onOpenCvReady = function(){ document.getElementById('encender').disabled=false; };
  // Por si OpenCV ya quedó listo antes de registrar el hook.
  if(window.cv && window.cv.Mat){ window.__onOpenCvReady(); }

  document.getElementById('encender').addEventListener('click',function(){
    navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false})
      .then(function(s){ video.srcObject=s; streaming=true;
        document.getElementById('encender').style.display='none';
        document.getElementById('capturar').style.display='block';
        est('Buscando el folio…'); loop(); })
      .catch(function(){ est('Sin acceso a la cámara. Revisá permisos y que sea HTTPS.'); });
  });

  // detección de A4 con OpenCV (bordes + contornos + filtro de forma)
  function detectar(){
    var src=cv.imread(grab), gray=new cv.Mat(), edges=new cv.Mat(), k=cv.getStructuringElement(cv.MORPH_RECT,new cv.Size(5,5));
    cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY); cv.GaussianBlur(gray,gray,new cv.Size(5,5),0);
    cv.Canny(gray,edges,40,120); cv.dilate(edges,edges,k);
    var cont=new cv.MatVector(), hier=new cv.Mat();
    cv.findContours(edges,cont,hier,cv.RETR_LIST,cv.CHAIN_APPROX_SIMPLE);
    var area0=src.rows*src.cols, best=null, bestScore=0;
    for(var i=0;i<cont.size();i++){
      var c=cont.get(i), a=cv.contourArea(c);
      if(a<area0*0.07){ c.delete(); continue; }
      var ap=new cv.Mat(); cv.approxPolyDP(c,ap,0.02*cv.arcLength(c,true),true);
      if(ap.rows===4 && cv.isContourConvex(ap)){
        var pts=[]; for(var j=0;j<4;j++) pts.push({x:ap.data32S[j*2],y:ap.data32S[j*2+1]});
        var o=ordenar(pts), w=(dist(o[0],o[1])+dist(o[3],o[2]))/2, h=(dist(o[0],o[3])+dist(o[1],o[2]))/2;
        var r=Math.min(w,h)/Math.max(w,h), rs=1-Math.min(1,Math.abs(r-A4)/0.45);
        if(rs>0.45){ var sc=(a/area0)*(0.4+0.6*rs); if(sc>bestScore){ bestScore=sc; best=o; } }
      }
      ap.delete(); c.delete();
    }
    src.delete(); gray.delete(); edges.delete(); hier.delete(); cont.delete(); k.delete();
    return best;
  }

  function loop(){
    if(!streaming) return;
    var vw=video.videoWidth, vh=video.videoHeight;
    if(vw){
      var s=Math.min(1,900/Math.max(vw,vh)); grab.width=Math.round(vw*s); grab.height=Math.round(vh*s);
      gctx.drawImage(video,0,0,grab.width,grab.height);
      live.width=grab.width; live.height=grab.height; lctx.drawImage(grab,0,0);
      var q=null; try{ q=detectar(); }catch(e){}
      if(q){
        // suavizado + estabilidad
        if(lastQuad){ var mov=0; for(var i=0;i<4;i++) mov+=dist(q[i],lastQuad[i]); mov/=4;
          for(var j=0;j<4;j++){ q[j].x=q[j].x*0.5+lastQuad[j].x*0.5; q[j].y=q[j].y*0.5+lastQuad[j].y*0.5; }
          if(mov < grab.width*0.02) stable++; else stable=0;
        } else stable=0;
        lastQuad=q;
        lctx.beginPath(); lctx.moveTo(q[0].x,q[0].y); for(var m=1;m<4;m++) lctx.lineTo(q[m].x,q[m].y); lctx.closePath();
        lctx.lineWidth=4; lctx.strokeStyle= stable>=NEED?'#2ec27e':'#F5C400'; lctx.stroke();
        document.getElementById('lock').style.width=Math.min(100,(stable/NEED)*100)+'%';
        est(stable>=NEED?'Capturando…':'Folio detectado ✓ — mantené quieto');
        if(stable>=NEED){ capturar(); return; }
      } else { lastQuad=null; stable=0; document.getElementById('lock').style.width='0%'; est('Buscando el folio… acercá / mejorá luz'); }
    }
    loopT=setTimeout(loop,160);
  }

  document.getElementById('capturar').addEventListener('click',function(){ if(lastQuad) capturar(); });

  function capturar(){
    streaming=false; clearTimeout(loopT);
    var o=lastQuad, w=(dist(o[0],o[1])+dist(o[3],o[2]))/2, h=(dist(o[0],o[3])+dist(o[1],o[2]))/2;
    var PW,PH; if(w>=h){ PW=Math.round(297*SCALE); PH=Math.round(210*SCALE); } else { PW=Math.round(210*SCALE); PH=Math.round(297*SCALE); }
    var src=cv.imread(grab);
    var st=cv.matFromArray(4,1,cv.CV_32FC2,[o[0].x,o[0].y,o[1].x,o[1].y,o[2].x,o[2].y,o[3].x,o[3].y]);
    var dt=cv.matFromArray(4,1,cv.CV_32FC2,[0,0,PW,0,PW,PH,0,PH]);
    var M=cv.getPerspectiveTransform(st,dt); if(warpMat) warpMat.delete(); warpMat=new cv.Mat();
    cv.warpPerspective(src,warpMat,M,new cv.Size(PW,PH));
    rect.width=PW; rect.height=PH;
    // Otsu de referencia
    var g=new cv.Mat(); cv.cvtColor(warpMat,g,cv.COLOR_RGBA2GRAY);
    var tmp=new cv.Mat(); otsuVal=cv.threshold(g,tmp,0,255,cv.THRESH_BINARY+cv.THRESH_OTSU); g.delete(); tmp.delete();
    src.delete(); st.delete(); dt.delete(); M.delete();
    document.getElementById('cardRes').style.display='block';
    document.getElementById('cardRes').scrollIntoView({behavior:'smooth'});
    document.getElementById('umbral').value=0; document.getElementById('umbralVal').textContent='auto';
    medir();
  }

  document.getElementById('umbral').addEventListener('input',function(e){ document.getElementById('umbralVal').textContent=(+e.target.value===0?'auto':e.target.value); medir(); });

  function medir(){
    if(!warpMat) return;
    var off=+document.getElementById('umbral').value, T=Math.max(1,Math.min(254,otsuVal+off));
    var g=new cv.Mat(); cv.cvtColor(warpMat,g,cv.COLOR_RGBA2GRAY);
    var bin=new cv.Mat(); cv.threshold(g,bin,T,255,cv.THRESH_BINARY_INV); // pie oscuro = blanco
    var k=cv.getStructuringElement(cv.MORPH_RECT,new cv.Size(5,5)); cv.morphologyEx(bin,bin,cv.MORPH_OPEN,k);
    var lab=new cv.Mat(), stats=new cv.Mat(), cen=new cv.Mat();
    var n=cv.connectedComponentsWithStats(bin,lab,stats,cen);
    var bi=0,ba=0; for(var i=1;i<n;i++){ var a=stats.intAt(i,cv.CC_STAT_AREA); if(a>ba){ba=a;bi=i;} }
    // overlay
    var disp=warpMat.clone();
    if(bi>0){
      var x=stats.intAt(bi,cv.CC_STAT_LEFT), y=stats.intAt(bi,cv.CC_STAT_TOP), w=stats.intAt(bi,cv.CC_STAT_WIDTH), h=stats.intAt(bi,cv.CC_STAT_HEIGHT);
      // tinte
      for(var yy=0;yy<disp.rows;yy++) for(var xx=0;xx<disp.cols;xx++){ if(lab.intAt(yy,xx)===bi){ var p=(yy*disp.cols+xx)*4; disp.data[p]=245;disp.data[p+1]=196;disp.data[p+2]=0; } }
      cv.imshow(rect,disp);
      var largo=Math.max(w,h)/SCALE, ancho=Math.min(w,h)/SCALE; rawLargo=largo;
      set((largo*factorCal).toFixed(0),(ancho*factorCal).toFixed(0),tallaPara(largo*factorCal));
    } else { cv.imshow(rect,disp); set('–','–','–'); }
    disp.delete(); g.delete(); bin.delete(); k.delete(); lab.delete(); stats.delete(); cen.delete();
  }
  function set(l,a,t){ document.getElementById('mLargo').innerHTML=l+(l==='–'?'':'<small> mm</small>'); document.getElementById('mAncho').innerHTML=a+(a==='–'?'':'<small> mm</small>'); document.getElementById('mTalla').textContent=t; }

  document.getElementById('otra').addEventListener('click',function(){ document.getElementById('cardRes').style.display='none'; lastQuad=null; stable=0; streaming=true; loop(); window.scrollTo({top:0,behavior:'smooth'}); });
  document.getElementById('calibrar').addEventListener('click',function(){ var r=+document.getElementById('pieReal').value; if(!r||!rawLargo){alert('Capturá primero.');return;} factorCal=r/rawLargo; document.getElementById('factorTxt').textContent='×'+factorCal.toFixed(3); medir(); });

  tallas=[[228,234,'36'],[234,240,'37'],[240,247,'38'],[247,253,'39'],[253,260,'40'],[260,266,'41'],[266,273,'42'],[273,280,'43'],[280,286,'44'],[286,293,'45'],[293,299,'46'],[299,306,'47']];
  function tallaPara(mm){ for(var i=0;i<tallas.length;i++){ if(mm>=tallas[i][0]&&mm<tallas[i][1]) return tallas[i][2]; } return '?'; }
})();
</script>

<!-- Loader robusto de OpenCV.js: Module.onRuntimeInitialized + fallback de CDN + timeout + reintento -->
<script>
(function(){
  var estadoEl = document.getElementById('estado');
  function setStatus(html, isError){
    if(!estadoEl) return;
    estadoEl.style.color = isError ? '#ff6b6b' : '';
    estadoEl.textContent = html;
  }

  var SOURCES = [
    { url:'https://docs.opencv.org/4.9.0/opencv.js',                                         name:'docs.opencv.org' },
    { url:'https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.10.0-release.1/dist/opencv.js', name:'jsDelivr (alternativo)' }
  ];
  var TIMEOUT_MS = 20000;
  var idx = 0, done = false, failed = false, deadline = null, curScript = null;

  // Hook oficial de Emscripten: DEBE existir antes de que opencv.js se ejecute.
  function armHook(){ window.Module = { onRuntimeInitialized: onRuntimeInit }; }
  function onRuntimeInit(){ if(done||failed) return; setStatus('inicializando…'); resolveCv(); }

  // Builds recientes (p.ej. techstark) exponen cv como Promise.
  function resolveCv(){
    if(window.cv && typeof window.cv.then === 'function'){
      window.cv.then(function(c){ window.cv = c; checkReady(); },
                     function(){ nextOrFail('No se pudo inicializar OpenCV.'); });
    } else { checkReady(); }
  }

  function checkReady(){
    if(done||failed) return;
    if(window.cv && window.cv.Mat){
      done = true; clearDeadline();
      setStatus('Listo. Tocá “Encender cámara”.');
      if(typeof window.__onOpenCvReady === 'function') window.__onOpenCvReady();
    } else {
      setStatus('inicializando…');
      setTimeout(checkReady, 100);
    }
  }

  function clearDeadline(){ if(deadline){ clearTimeout(deadline); deadline = null; } }

  function loadCurrent(){
    if(curScript && curScript.parentNode) curScript.parentNode.removeChild(curScript);
    armHook(); // re-armamos el hook para este build
    var srcobj = SOURCES[idx];
    setStatus('descargando OpenCV… (' + srcobj.name + ')');
    var s = document.createElement('script');
    s.src = srcobj.url;
    s.async = false;                 // NO async
    s.onload = function(){
      // Para builds tipo Promise (techstark) onRuntimeInitialized no se dispara: resolvemos manual.
      if(window.cv && typeof window.cv.then === 'function'){ onRuntimeInit(); }
      // Para el build oficial, onRuntimeInitialized se encargará.
    };
    s.onerror = function(){ nextOrFail('No se pudo descargar OpenCV desde ' + srcobj.name + '.'); };
    curScript = s;
    document.head.appendChild(s);
  }

  function nextOrFail(msg){
    if(done) return;
    if(idx < SOURCES.length - 1 && !failed){ idx++; loadCurrent(); return; }
    showError(msg);
  }

  function showError(msg){
    if(done) return;
    failed = true; clearDeadline();
    estadoEl.innerHTML = '';
    estadoEl.style.color = '#ff6b6b';
    var span = document.createElement('span');
    span.textContent = '⚠ ' + (msg || 'No se pudo cargar el motor de visión.') + ' ';
    var btn = document.createElement('button');
    btn.textContent = 'Reintentar';
    btn.className = 'btn ghost';
    btn.style.cssText = 'width:auto;padding:6px 12px;margin-left:8px;display:inline-block;color:#fff';
    btn.onclick = retry;
    estadoEl.appendChild(span); estadoEl.appendChild(btn);
  }

  function startDeadline(){
    clearDeadline();
    deadline = setTimeout(function(){
      showError('OpenCV tardó demasiado en inicializar (timeout ' + (TIMEOUT_MS/1000) + 's).');
    }, TIMEOUT_MS);
  }

  function retry(){
    idx = 0; done = false; failed = false;
    estadoEl.style.color = '';
    startDeadline();
    loadCurrent();
  }

  // Arranque
  startDeadline();
  loadCurrent();
})();
</script>
</body>
</html>
